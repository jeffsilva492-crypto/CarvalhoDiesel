<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Promoções - Carvalho Diesel</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
     body{
  background:
    radial-gradient(circle at 30% 20%, rgba(0,120,255,.2), transparent),
    linear-gradient(120deg,#021326,#0a1b38,#021326);
}

.ripple {
  position: relative;
  overflow: hidden;
}

.ripple span {
  position: absolute;
  border-radius: 50%;
  transform: scale(0);
  animation: ripple 600ms linear;
  background: rgba(255,255,255,0.4);
}

@keyframes ripple {
  to {
    transform: scale(4);
    opacity: 0;
  }
}
  </style>
</head>

<body class="text-white font-sans">

<!-- HEADER -->
<header class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-between">

  <!-- logo esquerda -->
  <a href="index.html">
  <img src="https://i.imgur.com/EHu8rAb.png" class="h-16 w-auto">
</a>

  <!-- menu direita -->
  <nav class="flex gap-8 items-center">
    <a href="sobre.html">Sobre</a>
    <a href="index.html">Loja</a>
    <a href="promocoes.html" class="text-green-400">Promoções</a>
    <a href="#footer">Contato</a>
  </nav>

</header>

<!-- HERO -->
<section class="max-w-4xl mx-auto px-6 text-center">

  <div class="relative overflow-hidden">

    <img id="bannerPromo"
         src="https://i.imgur.com/z2w0s0s.png"
         class="mx-auto rounded-xl shadow-xl max-h-[650px] object-contain transition-opacity duration-500">

          <!-- ⭐ TEXTO AQUI -->
  <p class="mt-3 text-xs text-gray-400 bg-white/5 px-3 py-1 rounded-full inline-block">
    Consulte disponibilidade • Preços sujeitos a alteração
  </p>

    <!-- setas -->
    <button onclick="prev()" class="absolute left-0 top-1/2 -translate-y-1/2 bg-green-500 w-10 h-10 rounded-full">
      ◀
    </button>

    <button onclick="next()" class="absolute right-0 top-1/2 -translate-y-1/2 bg-green-500 w-10 h-10 rounded-full">
      ▶
    </button>

  </div>

<button onclick="pedir()" class="ripple mt-6 bg-green-500 px-8 py-3 rounded-xl font-semibold hover:bg-green-400">
  Garantir oferta
</button>>

</section>
<script>
const banners = [
  {img:"https://i.imgur.com/cglMQ7z.png", nome:"Promoção Faixa Refletiva"},
  {img:"https://i.imgur.com/AmOCMuC.png", nome:"Promoção Faixa parachoque"},
  {img:"https://i.imgur.com/Zzzq2H3.png", nome:"Promoção Cinta c/Catraca"}
];

let i = 0;
let auto;

const img = document.getElementById("bannerPromo");

function atualizar(){
  img.style.opacity = 0;

  setTimeout(()=>{
    img.src = banners[i].img;
    img.style.opacity = 1;
  },250);
}

function next(){
  i = (i + 1) % banners.length;
  atualizar();
}

function prev(){
  i = (i - 1 + banners.length) % banners.length;
  atualizar();
}

function pedir(){
  const produto = banners[i].nome;
  const msg = encodeURIComponent("Olá, quero essa promoção: " + produto);
  window.open("https://wa.me/5561985410102?text=" + msg);
}

/* ⭐ AUTOPLAY */
function startAuto(){
  auto = setInterval(next, 4000);
}
startAuto();

/* ⭐ PAUSA AO HOVER */
img.addEventListener("mouseenter", ()=> clearInterval(auto));
img.addEventListener("mouseleave", startAuto);

/* ⭐ SWIPE MOBILE */
let startX = 0;

img.addEventListener("touchstart", e=>{
  startX = e.touches[0].clientX;
});

img.addEventListener("touchend", e=>{
  const endX = e.changedTouches[0].clientX;

  if(startX - endX > 50) next();
  if(endX - startX > 50) prev();
});
</script>
<script>
document.querySelectorAll(".ripple").forEach(btn=>{
  btn.addEventListener("click", function(e){
    const circle = document.createElement("span");
    const d = Math.max(this.clientWidth, this.clientHeight);

    circle.style.width = circle.style.height = d + "px";
    circle.style.left = e.offsetX - d/2 + "px";
    circle.style.top = e.offsetY - d/2 + "px";

    this.appendChild(circle);

    setTimeout(()=>circle.remove(),600);
  });
});
</script>

</body>
</html>
